# SonarQube configuration for ResumeAI Frontend
# This file is read by the sonar-scanner
sonar.host.url=http://localhost:9000
sonar.projectKey=resumeai-frontend
sonar.projectName=ResumeAI Frontend
sonar.projectVersion=1.0.0
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.test.tsx,src/**/*.test.ts,src/**/__tests__/**/*
sonar.exclusions=src/**/*.test.tsx,src/**/*.test.ts,src/**/__tests__/**/*,src/**/*.d.ts,node_modules/**,dist/**
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.file.suffixes=.js,.jsx,.mjs
sonar.typescript.file.suffixes=.ts,.tsx
sonar.sourceEncoding=UTF-8
sonar.coverage.exclusions=src/test/**,src/main.tsx,src/vite-env.d.ts
